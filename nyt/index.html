<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The New York Times</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="broadsheet">
    <header class="masthead">
      <div class="masthead-top">
        <span class="edition">Today's Paper</span>
        <span class="date" id="masthead-date"></span>
      </div>
      <h1 class="masthead-title"><a href="#" id="masthead-home">The New York Times</a></h1>
      <div class="masthead-rule"></div>
      <nav class="section-nav" id="section-nav"></nav>
    </header>

    <main class="article-grid" id="article-grid">
      <div class="loading" id="loading">Loading latest articles&hellip;</div>
    </main>

    <article class="article-detail" id="article-detail" hidden>
      <nav class="detail-nav">
        <button class="detail-back" id="detail-back">&larr; Back to front page</button>
        <a class="detail-source" id="detail-source" target="_blank" rel="noopener">View on nytimes.com &rarr;</a>
      </nav>
      <div class="masthead-rule"></div>
      <div class="detail-hero">
        <header class="detail-header">
          <span class="article-section" id="detail-section"></span>
          <h1 class="detail-headline" id="detail-headline"></h1>
          <div class="detail-meta">
            <span class="detail-byline" id="detail-byline"></span>
            <span class="detail-date" id="detail-date"></span>
          </div>
        </header>
        <figure class="detail-figure" id="detail-figure" hidden>
          <img class="detail-image" id="detail-image" alt="">
        </figure>
      </div>
      <div class="detail-body" id="detail-body"></div>
      <div class="detail-cta" id="detail-cta">
        <a class="cta-link" id="cta-link" target="_blank" rel="noopener">Read the full article on nytimes.com &rarr;</a>
      </div>
      <div class="masthead-rule"></div>
      <nav class="detail-nav detail-nav--bottom">
        <button class="detail-back" id="detail-back-bottom">&larr; Back to front page</button>
      </nav>
    </article>

    <footer class="broadsheet-footer">
      <p>Powered by The New York Times API</p>
      <p><a href="text.html">Text-only edition</a></p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
